# =============================================================================
# custom-sqli.conf  —  Tiered ModSecurity SQLi rules for SeqSQLi RL research
# =============================================================================
# Designed against payloads_full_less1.csv (union + error-based corpus).
# Each tier targets a DIFFERENT layer of the payload so an RL agent must learn
# a TIER-SPECIFIC mutation policy (not just one bypass technique).
#
# Rule IDs reserved: 100010 – 100039
# Place this file inside ModSecurity config dir, then in nginx.conf:
#     modsecurity_rules_file /etc/nginx/modsec/custom-sqli.conf;
# =============================================================================

# -----------------------------------------------------------------------------
# TIER 1 — NAIVE PHP-style blacklist (restored from user's prior config)
# Single mega-rule blocks: /*, --, #, literal space, +, AND exact-case
# select/union in 3 common forms. Mirrors what a beginner PHP dev with a
# str_replace() filter would write. THE strictness baseline.
#
# Bypass family agent must discover (none of these match this rule):
#   - case        → UniOn, SeLect (mixed case avoiding the 3 forms)
#   - tab_space   → %09 separator
#   - newline     → %0a separator
#   - vtab        → %0b separator
#   - formfeed    → %0c separator
#   - between_space → %a0 non-breaking space
#   - crlf        → %0d%0a
#   - paren_full  → wraps cols in parens to drop spaces entirely
#   - hash_nl     → %23xxx%0a as separator (note: %23 = # but in URL-encoded
#                   form, only blocked if urlDecodeUni decodes it — yes here)
#                   → so hash_nl WILL be blocked, agent should avoid
#   - null_byte   → ;%00 terminator instead of -- or #
# -----------------------------------------------------------------------------
SecRule ARGS:id "@rx (/\*|--|#|[ +]|select|union|Select|Union|SELECT|UNION)" \
    "id:100010,phase:2,deny,status:403,log,\
     msg:'T1: PHP-style mega blacklist',\
     t:none,t:urlDecodeUni"


# -----------------------------------------------------------------------------
# TIER 2 — MEDIUM surface (function/schema signatures)
# Bypassable via: semantic substitution (func_swap_err, func_space,
#                                         backtick), case variation.
# -----------------------------------------------------------------------------

# 100020 — information_schema literal (no lowercase!)
# Bypass: case (random_case includes INFORMATION_SCHEMA)
SecRule ARGS:id "@rx information_schema" \
    "id:100020,phase:2,deny,status:403,log,\
     msg:'T2: information_schema literal',\
     t:none,t:urlDecodeUni"

# 100021 — group_concat( with literal underscore
# Bypass: case, url_encode, backtick
SecRule ARGS:id "@rx group_concat\s*\(" \
    "id:100021,phase:2,deny,status:403,log,\
     msg:'T2: group_concat() call',\
     t:none,t:lowercase,t:urlDecodeUni"

# 100023 — Info-leak functions with optional whitespace before ()
# Pattern uses \s* AND urlDecodeUni → eats literal space, %0a, %09, %0c.
# Only NON-\s separators survive: %a0 (NBSP) and /**/ (inline comment).
# Bypass options agent must discover:
#     func_sp_nbsp  →  database%a0()      (NBSP not in \s)
#     func_sp_cmt   →  database/**/()     (regex sees /**/, fails \s* match)
# Naive variants (func_sp_lit, func_sp_nl, func_sp_tab, func_sp_ff)
# will FAIL — agent should de-prioritize them.
SecRule ARGS:id "@rx (database|user|version|current_user|session_user)\s*\(\s*\)" \
    "id:100023,phase:2,deny,status:403,log,\
     msg:'T2: info-leak function with optional whitespace',\
     t:none,t:lowercase,t:urlDecodeUni"

# 100023 — XPath error-based functions (extractvalue / updatexml ONLY)
# Bypass: func_swap_err — agent learns swap to UPDATEXML / EXTRACTVALUE
# (Other error funcs floor/exp/gtid_subset remain in corpus → no escape)
SecRule ARGS:id "@rx (extractvalue\s*\()" \
    "id:100024,phase:2,deny,status:403,log,\
     msg:'T2: EXTRACTVALUE error-based',\
     t:none,t:lowercase,t:urlDecodeUni"

SecRule ARGS:id "@rx (updatexml\s*\()" \
    "id:100025,phase:2,deny,status:403,log,\
     msg:'T2: UPDATEXML error-based',\
     t:none,t:lowercase,t:urlDecodeUni"


# -----------------------------------------------------------------------------
# TIER 3 — COMPLEX surface (table/column identifiers, hex literals)
# Bypassable via: ident_backtick, hex_to_char.
# -----------------------------------------------------------------------------

# 100030 — FROM <bare table identifier> for sensitive names
# Bypass: ident_backtick → FROM `users`
SecRule ARGS:id "@rx from\s+(users|accounts|admin|members|password)\b" \
    "id:100030,phase:2,deny,status:403,log,\
     msg:'T3: FROM <sensitive table>',\
     t:none,t:lowercase,t:urlDecodeUni"

# 100031 — Hex literals (commonly used as separators 0x7e/0x3a or as identifiers)
# Bypass: hex_to_char → CHAR(126) / CHAR(58)
SecRule ARGS:id "@rx 0x[0-9a-f]{2,}" \
    "id:100031,phase:2,deny,status:403,log,\
     msg:'T3: hex literal',\
     t:none,t:lowercase,t:urlDecodeUni"

# 100032 — Whitespace runs typical of pretty-printed UNION SELECT chains
# Bypass: tab_space / vtab / formfeed / between_space / comment / paren_full
# (the literal-space regex doesn't catch alternative whitespace chars)
SecRule ARGS:id "@rx (union|select)[ ]{2,}(distinct|all|select|from)" \
    "id:100032,phase:2,deny,status:403,log,\
     msg:'T3: literal-space UNION chain',\
     t:none,t:lowercase,t:urlDecodeUni"
