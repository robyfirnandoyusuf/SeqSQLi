# Disable semua OWASP CRS rules
# Hanya gunakan custom rules untuk SQLi Lab

# Disable semua rules dari OWASP CRS dengan ID range 900000-999999
SecRuleRemoveByTag "OWASP_CRS"
SecRuleRemoveByTag "attack-protocol"
SecRuleRemoveByTag "attack-sqli"
SecRuleRemoveByTag "attack-xss"
SecRuleRemoveByTag "attack-rce"
SecRuleRemoveByTag "attack-lfi"
SecRuleRemoveByTag "attack-rfi"
SecRuleRemoveByTag "attack-ssrf"
SecRuleRemoveByTag "attack-injection-php"
SecRuleRemoveByTag "attack-injection-generic"
SecRuleRemoveByTag "attack-session-fixation"

# Disable outbound data leakage detection
SecRuleRemoveById 951100
SecRuleRemoveById 951110
SecRuleRemoveById 951120
SecRuleRemoveById 951130
SecRuleRemoveById 951140
SecRuleRemoveById 951150
SecRuleRemoveById 951160
SecRuleRemoveById 951170
SecRuleRemoveById 951180
SecRuleRemoveById 951190
SecRuleRemoveById 951200
SecRuleRemoveById 951210
SecRuleRemoveById 951220
SecRuleRemoveById 951230
SecRuleRemoveById 951240
SecRuleRemoveById 951250
SecRuleRemoveById 951260

# Disable anomaly scoring
SecRuleRemoveById 949110
SecRuleRemoveById 959100

# Set anomaly threshold sangat tinggi (effectively disable)
SecAction \
    "id:9100000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.inbound_anomaly_score_threshold=999,\
    setvar:tx.outbound_anomaly_score_threshold=999"
